<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilul Meu — IntreabăCărțile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold:#C9A84C; --gold-dim:rgba(201,168,76,0.15); --dark:#0a0806; --text:#f0e6c8; --text-dim:#8a7a5a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--dark); color:var(--text); font-family:'Crimson Text',serif; min-height:100vh; overflow-x:hidden; }
        .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--d,3s) ease-in-out infinite; animation-delay:var(--delay,0s); opacity:var(--op,0.6); }
        @keyframes twinkle { 0%,100%{opacity:var(--op,0.6)} 50%{opacity:0.1} }
        nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 48px; height:64px; background:rgba(10,8,6,0.95); border-bottom:1px solid rgba(201,168,76,0.1); }
        .nav-logo { font-family:'Cinzel',serif; font-size:1rem; font-weight:700; color:var(--gold); text-decoration:none; letter-spacing:3px; text-transform:uppercase; }
        .nav-logo span { color:var(--text); }
        .nav-right { display:flex; align-items:center; gap:24px; }
        .nav-link { font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); text-decoration:none; transition:color 0.3s; cursor:pointer; background:none; border:none; }
        .nav-link:hover { color:var(--gold); }
        .wrap { position:relative; z-index:1; max-width:640px; margin:0 auto; padding:100px 20px 60px; }

        /* HEADER PROFIL */
        .profil-header { text-align:center; margin-bottom:48px; animation:fadeUp 0.8s ease both; }
        .profil-avatar { width:80px; height:80px; border-radius:50%; border:2px solid rgba(201,168,76,0.4); display:flex; align-items:center; justify-content:center; font-size:2rem; margin:0 auto 16px; background:rgba(201,168,76,0.06); }
        .profil-email { font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:2px; color:var(--text-dim); margin-bottom:4px; }
        .profil-titlu { font-family:'Cinzel',serif; font-size:1.4rem; color:var(--gold); font-weight:400; }

        /* SEDINTE CARD */
        .sedinte-card { background:rgba(201,168,76,0.04); border:1px solid rgba(201,168,76,0.25); border-radius:8px; padding:36px; text-align:center; margin-bottom:28px; animation:fadeUp 0.8s ease both; animation-delay:0.15s; }
        .sedinte-nr { font-family:'Cinzel',serif; font-size:5rem; color:var(--gold); line-height:1; display:block; filter:drop-shadow(0 0 20px rgba(201,168,76,0.3)); }
        .sedinte-label { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:4px; text-transform:uppercase; color:var(--text-dim); display:block; margin-top:8px; margin-bottom:24px; }
        .sedinte-bar-wrap { background:rgba(201,168,76,0.08); border-radius:20px; height:6px; margin-bottom:20px; overflow:hidden; }
        .sedinte-bar { background:var(--gold); height:100%; border-radius:20px; transition:width 1s ease; }
        .sedinte-info { font-size:0.92rem; color:var(--text-dim); font-style:italic; }

        /* ACTIUNI */
        .actiuni { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px; animation:fadeUp 0.8s ease both; animation-delay:0.25s; }
        .actiune-btn { padding:18px; border-radius:6px; text-align:center; cursor:pointer; text-decoration:none; display:block; transition:all 0.3s; border:1px solid rgba(201,168,76,0.25); background:rgba(201,168,76,0.03); }
        .actiune-btn:hover { border-color:var(--gold); background:rgba(201,168,76,0.08); transform:translateY(-2px); }
        .actiune-icon { font-size:1.8rem; display:block; margin-bottom:8px; }
        .actiune-label { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); display:block; }
        .actiune-desc { font-size:0.85rem; color:var(--text-dim); font-style:italic; margin-top:4px; display:block; }

        /* FARA SEDINTE */
        .fara-sedinte { background:rgba(201,168,76,0.03); border:1px solid rgba(201,168,76,0.15); border-radius:8px; padding:32px; text-align:center; margin-bottom:28px; animation:fadeUp 0.8s ease both; animation-delay:0.2s; }
        .fara-sedinte h3 { font-family:'Cinzel',serif; font-size:1rem; color:var(--gold); margin-bottom:10px; letter-spacing:2px; }
        .fara-sedinte p { color:var(--text-dim); font-size:0.95rem; font-style:italic; margin-bottom:20px; }
        .cumpara-btn { display:inline-block; padding:14px 32px; border:1px solid var(--gold); color:var(--gold); font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:3px; text-transform:uppercase; text-decoration:none; border-radius:2px; transition:all 0.3s; position:relative; overflow:hidden; }
        .cumpara-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:var(--gold); transition:left 0.3s; z-index:-1; }
        .cumpara-btn:hover { color:var(--dark); }
        .cumpara-btn:hover::before { left:0; }

        /* LOADING */
        .loading { text-align:center; padding:60px; }
        .loading-orb { width:50px; height:50px; border-radius:50%; border:2px solid rgba(201,168,76,0.1); border-top-color:var(--gold); animation:spin 1s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .loading p { font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim); }

        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @media(max-width:600px) { nav{padding:0 20px} .actiuni{grid-template-columns:1fr} }
    </style>
</head>
<body>
<div class="stars" id="stars"></div>
<nav>
    <a href="index.html" class="nav-logo">Întreabă<span>Cărțile</span></a>
    <div class="nav-right">
        <a href="index.html" class="nav-link">Ședință Nouă</a>
        <button class="nav-link" onclick="logout()">Ieșire</button>
    </div>
</nav>

<div class="wrap">
    <!-- LOADING -->
    <div class="loading" id="loading">
        <div class="loading-orb"></div>
        <p>Se încarcă profilul...</p>
    </div>

    <!-- CONTINUT -->
    <div id="continut" style="display:none;">
        <div class="profil-header">
            <div class="profil-avatar">🔮</div>
            <p class="profil-email" id="user-email"></p>
            <h1 class="profil-titlu">Profilul Meu</h1>
        </div>

        <!-- SEDINTE DISPONIBILE -->
        <div class="sedinte-card" id="sedinte-card">
            <span class="sedinte-nr" id="sedinte-nr">0</span>
            <span class="sedinte-label">ședințe disponibile</span>
            <div class="sedinte-bar-wrap">
                <div class="sedinte-bar" id="sedinte-bar" style="width:0%"></div>
            </div>
            <p class="sedinte-info" id="sedinte-info"></p>
        </div>

        <!-- FARA SEDINTE -->
        <div class="fara-sedinte" id="fara-sedinte" style="display:none;">
            <h3>Ședințele s-au terminat</h3>
            <p>Cumpără un pachet pentru a continua consultațiile cu cărțile.</p>
            <a href="abonament.html" class="cumpara-btn">✦ Cumpără Ședințe ✦</a>
        </div>

        <!-- ACTIUNI -->
        <div class="actiuni">
            <a href="index.html" class="actiune-btn">
                <span class="actiune-icon">🃏</span>
                <span class="actiune-label">Ședință Nouă</span>
                <span class="actiune-desc">Consultă cărțile acum</span>
            </a>
            <a href="abonament.html" class="actiune-btn">
                <span class="actiune-icon">✨</span>
                <span class="actiune-label">Cumpără Ședințe</span>
                <span class="actiune-desc">30 lei / 10 ședințe</span>
            </a>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://theirjnbasxmfiexiqou.supabase.co';
const SUPABASE_KEY = 'sb_publishable_E0f-T4R6QbEMfITSHwKt2g_gM5rkKXE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function incarcaProfil() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'cont.html'; return; }

    const user = session.user;
    document.getElementById('user-email').textContent = user.email;

    const { data: profil, error } = await sb.from('profiluri').select('sedinte').eq('id', user.id).single();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('continut').style.display = 'block';

    const sedinte = profil ? profil.sedinte : 0;
    document.getElementById('sedinte-nr').textContent = sedinte;

    const max = 20;
    const procent = Math.min((sedinte / max) * 100, 100);
    document.getElementById('sedinte-bar').style.width = procent + '%';

    if (sedinte === 0) {
        document.getElementById('sedinte-card').style.display = 'none';
        document.getElementById('fara-sedinte').style.display = 'block';
        document.getElementById('sedinte-info').textContent = '';
    } else if (sedinte === 1) {
        document.getElementById('sedinte-info').textContent = 'Mai ai o singură ședință — folosește-o cu înțelepciune.';
    } else if (sedinte <= 3) {
        document.getElementById('sedinte-info').textContent = 'Ședințele tale sunt aproape de final — gândește-te să îți reînnoiești pachetul.';
    } else {
        document.getElementById('sedinte-info').textContent = 'Cărțile te așteaptă. Fiecare ședință aduce un nou mesaj.';
    }
}

async function logout() {
    await sb.auth.signOut();
    window.location.href = 'index.html';
}

incarcaProfil();

const sc = document.getElementById('stars');
for (let i=0;i<100;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--op:${0.2+Math.random()*0.5};width:${1+Math.random()*1.5}px;height:${1+Math.random()*1.5}px;`;sc.appendChild(s);}
</script>
</body>
</html>

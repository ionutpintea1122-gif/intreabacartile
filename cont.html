<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cont — IntreabăCărțile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold:#C9A84C; --gold-dim:rgba(201,168,76,0.15); --dark:#0a0806; --dark2:#100e0b; --text:#f0e6c8; --text-dim:#8a7a5a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--dark); color:var(--text); font-family:'Crimson Text',serif; min-height:100vh; overflow-x:hidden; }
        .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--d,3s) ease-in-out infinite; animation-delay:var(--delay,0s); opacity:var(--op,0.6); }
        @keyframes twinkle { 0%,100%{opacity:var(--op,0.6)} 50%{opacity:0.1} }
        nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 48px; height:64px; background:rgba(10,8,6,0.95); border-bottom:1px solid rgba(201,168,76,0.1); }
        .nav-logo { font-family:'Cinzel',serif; font-size:1rem; font-weight:700; color:var(--gold); text-decoration:none; letter-spacing:3px; text-transform:uppercase; }
        .nav-logo span { color:var(--text); }
        .nav-back { font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); text-decoration:none; transition:color 0.3s; }
        .nav-back:hover { color:var(--gold); }
        .wrap { position:relative; z-index:1; max-width:460px; margin:0 auto; padding:110px 20px 60px; }
        .page-header { text-align:center; margin-bottom:36px; animation:fadeUp 0.8s ease both; }
        .page-icon { font-size:2.5rem; display:block; margin-bottom:12px; filter:drop-shadow(0 0 16px rgba(201,168,76,0.4)); }
        .page-title { font-family:'Cinzel',serif; font-size:1.6rem; font-weight:400; color:var(--gold); }
        .tabs { display:flex; border:1px solid rgba(201,168,76,0.2); border-radius:4px; overflow:hidden; margin-bottom:28px; animation:fadeUp 0.8s ease both; animation-delay:0.1s; }
        .tab { flex:1; padding:13px; background:transparent; border:none; font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); cursor:pointer; transition:all 0.3s; }
        .tab.activ { background:rgba(201,168,76,0.12); color:var(--gold); }
        .form-box { background:rgba(201,168,76,0.03); border:1px solid rgba(201,168,76,0.2); border-radius:8px; padding:32px; animation:fadeUp 0.8s ease both; animation-delay:0.2s; }
        .form-group { margin-bottom:18px; }
        .form-label { display:block; margin-bottom:7px; font-family:'Cinzel',serif; font-size:0.63rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
        .form-input { width:100%; background:rgba(201,168,76,0.04); border:1px solid rgba(201,168,76,0.2); border-radius:4px; padding:13px 15px; color:var(--text); font-family:'Crimson Text',serif; font-size:1.05rem; outline:none; transition:border-color 0.3s; }
        .form-input:focus { border-color:var(--gold); }
        .form-input::placeholder { color:var(--text-dim); opacity:0.6; }
        .submit-btn { width:100%; background:transparent; border:1px solid var(--gold); color:var(--gold); font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:3px; text-transform:uppercase; padding:15px; border-radius:2px; cursor:pointer; transition:all 0.4s; position:relative; overflow:hidden; margin-top:6px; }
        .submit-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:var(--gold); transition:left 0.4s; z-index:-1; }
        .submit-btn:hover { color:var(--dark); }
        .submit-btn:hover::before { left:0; }
        .submit-btn:disabled { border-color:#333; color:#444; cursor:not-allowed; }
        .submit-btn:disabled::before { display:none; }
        .mesaj { margin-top:14px; padding:12px 16px; border-radius:4px; font-size:0.92rem; text-align:center; display:none; line-height:1.5; }
        .mesaj.succes { display:block; background:rgba(100,200,100,0.08); border:1px solid rgba(100,200,100,0.25); color:#90d090; }
        .mesaj.eroare { display:block; background:rgba(200,80,80,0.08); border:1px solid rgba(200,80,80,0.25); color:#e09090; }
        .link-secundar { text-align:center; margin-top:18px; font-size:0.9rem; color:var(--text-dim); font-style:italic; }
        .link-secundar a { color:var(--gold); text-decoration:none; }
        .gratuit-badge { text-align:center; margin-top:20px; font-size:0.88rem; color:var(--text-dim); font-style:italic; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @media(max-width:600px) { nav{padding:0 20px} .form-box{padding:22px} }
    </style>
</head>
<body>
<div class="stars" id="stars"></div>
<nav>
    <a href="index.html" class="nav-logo">Întreabă<span>Cărțile</span></a>
    <a href="index.html" class="nav-back">← Înapoi</a>
</nav>
<div class="wrap">
    <div class="page-header">
        <span class="page-icon">🔮</span>
        <h1 class="page-title">Contul Tău</h1>
    </div>
    <div class="tabs">
        <button class="tab activ" id="tab-login" onclick="schimbaTab('login')">Autentificare</button>
        <button class="tab" id="tab-reg" onclick="schimbaTab('reg')">Cont Nou</button>
    </div>

    <!-- LOGIN -->
    <div class="form-box" id="form-login">
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="login-email" placeholder="adresa@email.com">
        </div>
        <div class="form-group">
            <label class="form-label">Parolă</label>
            <input type="password" class="form-input" id="login-parola" placeholder="••••••••">
        </div>
        <button class="submit-btn" id="btn-login" onclick="login()">✦ Intră în Cont ✦</button>
        <div class="mesaj" id="login-mesaj"></div>
        <div class="link-secundar">Nu ai cont? <a href="#" onclick="schimbaTab('reg')">Creează unul gratuit</a></div>
    </div>

    <!-- REGISTER -->
    <div class="form-box" id="form-reg" style="display:none;">
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="reg-email" placeholder="adresa@email.com">
        </div>
        <div class="form-group">
            <label class="form-label">Parolă</label>
            <input type="password" class="form-input" id="reg-parola" placeholder="Minim 6 caractere">
        </div>
        <div class="form-group">
            <label class="form-label">Confirmă Parola</label>
            <input type="password" class="form-input" id="reg-parola2" placeholder="Repetă parola">
        </div>
        <button class="submit-btn" id="btn-reg" onclick="register()">✦ Creează Cont ✦</button>
        <div class="mesaj" id="reg-mesaj"></div>
        <div class="gratuit-badge">🕯️ Primești 2 ședințe gratuite la înregistrare</div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://theirjnbasxmfiexiqou.supabase.co';
const SUPABASE_KEY = 'sb_publishable_E0f-T4R6QbEMfITSHwKt2g_gM5rkKXE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'profil.html';
});

function schimbaTab(tab) {
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-reg').style.display = tab === 'reg' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('activ', tab === 'login');
    document.getElementById('tab-reg').classList.toggle('activ', tab === 'reg');
}

async function login() {
    const email = document.getElementById('login-email').value.trim();
    const parola = document.getElementById('login-parola').value;
    const mesaj = document.getElementById('login-mesaj');
    const btn = document.getElementById('btn-login');
    if (!email || !parola) { mesaj.className='mesaj eroare'; mesaj.textContent='Completează toate câmpurile.'; return; }
    btn.disabled = true; btn.textContent = 'Se verifică...';
    const { error } = await sb.auth.signInWithPassword({ email, password: parola });
    if (error) {
        mesaj.className='mesaj eroare'; mesaj.textContent='Email sau parolă incorectă.';
        btn.disabled = false; btn.textContent = '✦ Intră în Cont ✦';
    } else {
        mesaj.className='mesaj succes'; mesaj.textContent='✅ Autentificat! Te redirecționăm...';
        setTimeout(() => window.location.href = 'profil.html', 1000);
    }
}

async function register() {
    const email = document.getElementById('reg-email').value.trim();
    const parola = document.getElementById('reg-parola').value;
    const parola2 = document.getElementById('reg-parola2').value;
    const mesaj = document.getElementById('reg-mesaj');
    const btn = document.getElementById('btn-reg');
    if (!email || !parola || !parola2) { mesaj.className='mesaj eroare'; mesaj.textContent='Completează toate câmpurile.'; return; }
    if (parola !== parola2) { mesaj.className='mesaj eroare'; mesaj.textContent='Parolele nu coincid.'; return; }
    if (parola.length < 6) { mesaj.className='mesaj eroare'; mesaj.textContent='Parola trebuie să aibă minim 6 caractere.'; return; }
    btn.disabled = true; btn.textContent = 'Se creează contul...';
    const { error } = await sb.auth.signUp({ email, password: parola });
    if (error) {
        mesaj.className='mesaj eroare';
        mesaj.textContent = error.message.includes('already') ? 'Acest email este deja înregistrat.' : 'Eroare. Încearcă din nou.';
        btn.disabled = false; btn.textContent = '✦ Creează Cont ✦';
    } else {
        mesaj.className='mesaj succes';
        mesaj.textContent='✅ Cont creat! Verifică emailul pentru confirmare, apoi autentifică-te.';
        btn.disabled = false; btn.textContent = '✦ Creează Cont ✦';
    }
}

const sc = document.getElementById('stars');
for (let i=0;i<100;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--op:${0.2+Math.random()*0.5};width:${1+Math.random()*1.5}px;height:${1+Math.random()*1.5}px;`;sc.appendChild(s);}
</script>
</body>
</html>
